<article class="tile" itemscope itemtype="http://schema.org/Article">
  <a href="{{ site.url }}{{ post.url }}" title="{{ post.title }}" class="post-teaser">{% if post.image.teaser %}<img src="{{ site.url }}/assets/images/{{ post.image.teaser }}" alt="teaser" itemprop="image">
    {% endif %}</a>
  {% if post.date %}<p class="entry-date date published"><time datetime="{{ post.date | date: "%Y-%m-%d" }}" itemprop="datePublished">{{ post.date | date: "%B %d, %Y" }}</time></p>{% endif %}
  <h2 class="post-title" itemprop="name"><a href="{{ site.url }}{{ post.url }}">{% if post.event %}{{ post.event }}:&nbsp;&ldquo;{% endif %}{{ post.title }}{% if post.event %}&rdquo;{% endif %}</a></h2>
  <p class="post-excerpt" itemprop="description">{{ post.excerpt | strip_html | truncate: 160 }}</p>
  <!-- <a href="/{{ post.kind }}/" class="btn-inverse">View more {{ post.kind | pluralize }}</a> -->
</article><!-- /.tile -->
