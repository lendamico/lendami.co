<!DOCTYPE html>
<html>
{% include head.html %}

  <body>
    {% include header.html %}

    {% if page.image.feature %}
    <div class="page-lead" style="background-image:url({{ site.url }}/assets/images/{{ page.image.feature }})">
      <div class="wrap page-lead-content">
        <h1>{{ page.title }}</h1>
        <h2> {{ page.excerpt }}</h2>
      </div><!-- /.page-lead-content -->
    </div><!-- /.page-lead -->
    {% endif %}

    <div id="page-wrapper">
      {% include browser-upgrade.html %}

      <div id="main" role="main">
        <div class="wrap">

          <div class="archive-wrap">
            <div class="page-content">
              {{ content }}
            </div><!-- /.page-content -->
          </div class="archive-wrap"><!-- /.archive-wrap -->
        </div><!-- /.wrap -->
      </div><!-- /#main -->

      {% include footer.html %}
    </div>

    <script src="{{ site.url }}/assets/js/vendor/jquery-1.9.1.min.js"></script>
    <script src="{{ site.url }}/assets/js/main.js"></script>

  </body>

</html>
